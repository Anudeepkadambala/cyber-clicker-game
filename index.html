<!DOCTYPE html>
<html>
<head>
  <title>Cyber Hack Challenge</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: black;
      color: #00ffcc;
    }
    button {
      padding: 20px;
      font-size: 18px;
      margin-top: 20px;
      background: #00ffcc;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background: #00cc99;
      color: white;
    }
  </style>
</head>
<body>

<h1>💻 Cyber Hack Challenge</h1>
<p>Score: <span id="score">0</span></p>
<p>Time Left: <span id="time">15</span>s</p>
<p id="status">Start hacking...</p>

<button onclick="hack()">HACK 🔓</button>

<script>
let score = 0;
let timeLeft = 15;
let gameActive = true;

function hack() {
  if (gameActive) {
    score++;
    document.getElementById("score").innerText = score;

    if (score > 20) {
      document.getElementById("status").innerText = "🔥 Access Level: ROOT";
    } else if (score > 10) {
      document.getElementById("status").innerText = "⚡ Access Level: ADMIN";
    }
  }
}

let timer = setInterval(() => {
  if (timeLeft > 0) {
    timeLeft--;
    document.getElementById("time").innerText = timeLeft;
  } else {
    gameActive = false;
    clearInterval(timer);
    document.getElementById("status").innerText = "💀 System Locked!";
    alert("Final Score: " + score);
  }
}, 1000);
</script>

</body>
</html>
