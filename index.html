<!DOCTYPE html>
<html>
<head>
  <title>Cyber Clicker</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: black;
      color: lime;
    }
    button {
      padding: 20px;
      font-size: 20px;
      margin-top: 20px;
      background: lime;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background: green;
      color: white;
    }
  </style>
</head>
<body>

<h1>💻 Cyber Clicker</h1>
<p>Score: <span id="score">0</span></p>
<p>Time Left: <span id="time">10</span>s</p>

<button onclick="hack()">HACK 🔓</button>

<script>
let score = 0;
let timeLeft = 10;
let gameActive = true;

function hack() {
  if (gameActive) {
    score++;
    document.getElementById("score").innerText = score;
  }
}

let timer = setInterval(() => {
  if (timeLeft > 0) {
    timeLeft--;
    document.getElementById("time").innerText = timeLeft;
  } else {
    gameActive = false;
    clearInterval(timer);
    alert("💀 System Locked! Your Score: " + score);
  }
}, 1000);
</script>

</body>
</html>
